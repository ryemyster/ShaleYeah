name: Release with SLSA Provenance and Cosign

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Clean build artifacts
      run: npm run clean

    - name: Run tests and type check
      run: |
        npm run type-check
        npm run lint

    - name: Build TypeScript project
      run: |
        npm run build || echo "Build script not configured, using typescript compilation"

    - name: Create release package
      run: |
        mkdir -p dist
        tar -czf dist/shale-yeah-${{ github.ref_name }}.tar.gz \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=dist \
          --exclude=data/temp \
          --exclude=data/outputs/reports \
          --exclude=data/outputs/models \
          .

    - name: Generate artifact hash
      id: hash
      run: |
        cd dist
        echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

    - name: Upload release assets
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: release-assets
        path: dist/

  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a  # v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true

  sign:
    needs: [release]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Download release assets
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: release-assets
        path: dist/

    - name: Install Cosign
      uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0

    - name: Sign release assets
      run: |
        cd dist
        for file in *; do
          cosign sign-blob --yes "$file" --output-signature "${file}.sig"
          cosign sign-blob --yes "$file" --output-certificate "${file}.pem"
        done

    - name: Upload signed assets
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: signed-assets
        path: dist/

  verify-branding:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Verify SHALE YEAH branding
      run: |
        export RUN_ID=release-$(date +%Y%m%d-%H%M%S)
        mkdir -p data/temp/test/$RUN_ID
        echo "Generated with SHALE YEAH (c) Ryan McDonald / Ascendvent LLC - Apache-2.0" > data/temp/test/$RUN_ID/test.md
        bash scripts/verify-branding.sh