name: CodeQL Security Analysis
on: [push, pull_request, schedule]
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions: { security-events: write, actions: read, contents: read }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - uses: github/codeql-action/init@480db559a14342288b67e54bd959dd52dc3ee68f  # v3
        with: { languages: javascript-typescript, queries: security-extended }
      - uses: github/codeql-action/analyze@480db559a14342288b67e54bd959dd52dc3ee68f  # v3