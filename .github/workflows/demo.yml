name: Demo Pipeline Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo-test:
    runs-on: ubuntu-latest
    name: Test Full Demo Pipeline

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: '20.x'
        cache: 'npm'

    - run: npm ci --legacy-peer-deps

    - name: Run demo pipeline
      run: npm run demo

    - name: Verify demo outputs
      run: |
        if ls ./outputs/demo/*/INVESTMENT_DECISION.md 1> /dev/null 2>&1; then
          echo "✅ Demo pipeline generated investment report"
        else
          echo "❌ Demo pipeline failed to generate outputs"
          ls -la ./outputs/demo/ 2>/dev/null || echo "No demo outputs found"
          exit 1
        fi

    - name: Upload demo artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: always()
      with:
        name: demo-outputs
        path: outputs/demo/
        retention-days: 7
